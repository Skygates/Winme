      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(235 143) rotate(53.4) scale(365 515)">
      <stop stop-color="#1DBF73" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#1DBF73" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(932 118) rotate(135.1) scale(262 356)">
      <stop stop-color="#FF3D2E" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FF3D2E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="748" y1="118" x2="1055" y2="491" gradientUnits="userSpaceOnUse">
