    <tspan x="82" dy="88">into a game people want</tspan>
    <tspan x="82" dy="88">to play.</tspan>
  </text>

  <text x="86" y="492" fill="#D1D5DB" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="500">
